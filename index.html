<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yash Verma Portfolio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  color: white;
}
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="card p-8 max-w-md w-full text-center">

<h1 class="text-3xl font-bold mb-2">👋 Hello, I'm Yash</h1>
<p class="text-gray-300 mb-6">Web Developer | Student | Tech Enthusiast</p>

<button onclick="showMessage()" 
class="bg-blue-600 px-6 py-3 rounded-lg hover:bg-blue-700 transition">
Click Me
</button>

<p id="msg" class="mt-4 hidden text-green-300">
🚀 Your PWA is working!
</p>

</div>

<script>
function showMessage() {
  document.getElementById("msg").classList.toggle("hidden");
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>

</body>
</html>
